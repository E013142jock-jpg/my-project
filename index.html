<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #fff; color: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { max-width: 600px; }
        h1 { font-size: 24px; font-weight: 500; margin: 0 20px 0 0; padding: 10px 20px 10px 0; border-right: 1px solid rgba(0, 0, 0, .3); display: inline-block; vertical-align: top; }
        .message { display: inline-block; text-align: left; line-height: 49px; height: 49px; vertical-align: middle; }
        .message span { font-size: 14px; font-weight: 400; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <div class="message">
            <span>This page could not be found.</span>
        </div>
    </div>
</body>
</html>
